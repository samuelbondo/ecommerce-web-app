name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-server:
    name: Server — Install & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Run server tests
        run: npm test --if-present
        working-directory: server
        env:
          PORT: 5000
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: samuel_store
          JWT_SECRET: test_secret
      - name: Check server starts
        run: node -e "require('./index.js')" &
        working-directory: server
        env:
          PORT: 5000
          DB_HOST: localhost
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: samuel_store
          JWT_SECRET: test_secret

  test-client:
    name: Client — Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install client dependencies
        run: npm install
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: http://localhost:5000/api

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build server image
        run: docker build -t samuel-store-server ./server
      - name: Build client image
        run: docker build -t samuel-store-client ./client

  deploy:
    name: Deploy — Notify
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Samuel Store — Deployment Pipeline"
          echo "========================================"
          echo "  Backend  → Render (auto-deploy on push)"
          echo "  Frontend → Vercel (auto-deploy on push)"
          echo "  Database → Aiven MySQL 8.4 (Amsterdam)"
          echo "----------------------------------------"
          echo "  All checks passed. Live in ~1-2 min."
          echo "  https://samuel-store.vercel.app"
          echo "========================================"
