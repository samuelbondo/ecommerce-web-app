services:
  db:
    image: mysql:8.0
    container_name: samuel_store_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: samuel_store
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  server:
    build: ./server
    container_name: samuel_store_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: samuel_store
      JWT_SECRET: samuel_store_secret_key_2024
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    container_name: samuel_store_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  db_data:
